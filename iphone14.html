<!DOCTYPE html><html lang="zh-TW"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iPhone 14 預覽 · Secret Lover OST</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:radial-gradient(circle at 50% 0%,#2a2a30,#111);display:flex;flex-direction:column;align-items:center;gap:14px;padding:26px 12px;font-family:-apple-system,"PingFang TC",sans-serif;color:#cfcfd6}
h1{font-size:15px;font-weight:600;margin:0}
.hint{font-size:12px;color:#8b8b95;text-align:center;max-width:360px;line-height:1.6}
.device{position:relative;width:390px;height:844px;flex:none;border-radius:55px;background:#000;box-shadow:0 30px 80px rgba(0,0,0,.7),0 0 0 13px #1c1c1e,0 0 0 15px #3a3a3c}
.screen{position:absolute;inset:13px;border-radius:44px;overflow:hidden;background:#0d0a12}
.screen iframe{width:100%;height:100%;border:0;display:block;background:#0d0a12}
.island{position:absolute;top:24px;left:50%;transform:translateX(-50%);width:118px;height:33px;background:#000;border-radius:20px;z-index:20;pointer-events:none}
.statusbar{position:absolute;top:24px;left:13px;right:13px;height:44px;z-index:19;pointer-events:none;display:flex;justify-content:space-between;align-items:center;padding:0 34px;color:#fff;font-size:15px;font-weight:600;font-family:-apple-system,sans-serif}
.home{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:rgba(255,255,255,.55);z-index:20;pointer-events:none}
.row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{padding:8px 14px;border-radius:10px;border:1px solid #4a4a52;background:#2a2a30;color:#fff;font-size:13px;cursor:pointer}
button:hover{background:#3a3a42}
</style></head><body>
<h1>iPhone 14 預覽 · 390 × 844</h1>
<div class="hint">已模擬瀏海(動態島)與底部安全區(上 47px / 下 34px)。這跟你真機看到的幾乎一樣,不受手機快取影響。</div>
<div class="device">
  <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋦</span></div>
  <div class="island"></div>
  <div class="screen"><iframe id="f" src="t-sim.html?fr"></iframe></div>
  <div class="home"></div>
</div>
<div class="row">
  <button onclick="reload()">重新整理</button>
  <button onclick="setDev('iphone14','47','34')">iPhone 14 (47/34)</button>
  <button onclick="setDev('iphone8','20','0')">舊機無瀏海 (20/0)</button>
</div>
<script>
var f=document.getElementById('f'),SAT='47px',SAB='34px';
function apply(){try{var d=f.contentDocument;if(!d||!d.documentElement)return;d.documentElement.style.setProperty('--sat',SAT);d.documentElement.style.setProperty('--sab',SAB);}catch(e){}}
f.addEventListener('load',apply);setInterval(apply,400);
function reload(){f.src=f.src.split('?')[0]+'?'+Date.now();}
function setDev(n,t,b){SAT=t+'px';SAB=b+'px';apply();}
</script>
</body></html>
